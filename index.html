<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AttendX — Staff Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/jpeg" href="ideogram.jpg"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="login-container" id="login-box">
  
  <div class="brand-panel">
    <div class="brand-logo">AttendX</div>
    <div class="brand-title">Welcome Back Staff.</div>
    <div class="brand-desc">Log in to manage attendance, distribute marks, and notify parents effortlessly.</div>
  </div>

  <div class="form-panel" id="form-panel">
    <div class="form-header">
      <h2>Sign In</h2>
      <p>Enter your staff credentials to continue.</p>
    </div>

    <form id="login-form">
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="ts101" autocomplete="off" />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <button type="submit" class="login-btn" id="login-btn">
        Sign In
        <div class="spinner"></div>
      </button>

      <div class="footer-links" style="margin-top: 20px; text-align: center; font-size: 13px;">
        <a href="forgot.html" style="color: var(--muted); text-decoration: none; transition: color 0.15s;">Forgot Password?</a>
        <span style="color: var(--muted); margin: 0 5px;">|</span>
        <a href="register.html" style="color: var(--muted); text-decoration: none; transition: color 0.15s;">New User? Register</a>
      </div>

      <div class="error-msg" id="error-msg">Incorrect username or password.</div>
    </form>
  </div>

</div>

<!-- Maintenance/Status Modal -->
<div class="modal-overlay" id="status-modal">
  <div class="modal" style="max-width: 380px; text-align: center; padding: 40px 30px;">
    <div id="status-icon" style="font-size: 54px; margin-bottom: 20px;">🚧</div>
    <h2 id="status-title" style="margin-bottom: 12px; font-size: 22px;">System Notice</h2>
    <p id="status-message" style="color: var(--muted); margin-bottom: 30px; line-height: 1.6; font-size: 14px;"></p>
    <button class="login-btn" onclick="document.getElementById('status-modal').classList.remove('show')" style="opacity: 1; transform: none; animation: none;">
      Understand
    </button>
  </div>
</div>

<script src="login.js"></script>

<script src="theme.js"></script></body>
</html>
