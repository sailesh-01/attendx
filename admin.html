<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AttendX — Staff Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="icon" type="image/jpeg" href="ideogram.jpg"/>
<link rel="stylesheet" href="styles.css"/>
<style>
  .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
  .staff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: transform 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
  .staff-card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .staff-info h3 { margin: 0 0 5px 0; font-size: 18px; color: var(--text); }
  .staff-info p { margin: 0; font-size: 13px; color: var(--muted); }
  .staff-meta { display: flex; gap: 10px; margin-top: 15px; }
  .meta-tag { background: var(--bg); border: 1px solid var(--border); padding: 4px 10px; border-radius: 6px; font-size: 11px; font-family: var(--mono); color: var(--muted2); }
  .card-actions { margin-top: 20px; display: flex; justify-content: flex-end; border-top: 1px solid var(--border); padding-top: 15px; }
  .btn-delete { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: 0.2s; }
  .btn-delete:hover { background: #ef4444; color: white; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }
</style>
</head>
<body>

<nav>
  <span class="nav-logo">AttendX</span>
  <a class="nav-link" href="attendance.html">📋 Attendance</a>
  <a class="nav-link" href="students.html">👥 Students</a>
  <a class="nav-link" href="marks.html">📊 Marks</a>
  <a class="nav-link" href="whatsapp.html">💬 WhatsApp</a>
  <a class="nav-link active" id="admin-nav" href="admin.html">🛡️ Admin</a>
  <a class="nav-link nav-logout" href="index.html">🚪 Logout</a>
</nav>

<div class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Staff Management</div>
      <div class="page-sub">Admin Control Panel · Manage access for registered staff members</div>
    </div>
    <div class="header-actions">
        <input type="text" id="staff-search" class="finput" style="width:250px" placeholder="Search by username..."/>
    </div>
  </div>

  <div id="staff-list" class="admin-grid">
    <!-- Staff cards will be injected here -->
    <div class="empty-state">
        <div class="empty-icon">📂</div>
        <p>Loading staff registry...</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"><div class="tdot" id="tdot"></div><span id="tmsg"></span></div>

<script src="data.js"></script>
<script src="admin.js"></script>
<script>
    // Security check: Only Admin can stay here
    const loggedUser = localStorage.getItem("attendx_logged_staff");
    if (loggedUser !== 'ADMIN') {
        window.location.href = 'attendance.html';
    }
</script>
</body>
</html>
